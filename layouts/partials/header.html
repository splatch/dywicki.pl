<header class="sticky top-0 z-50 bg-white dark:bg-gray-900 shadow-sm dark:shadow-gray-800 border-b border-gray-100 dark:border-gray-800">
  <div class="container mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="text-lg font-bold text-gray-900 dark:text-white hover:text-blue-700 dark:hover:text-blue-400 transition-colors">
      {{ .Site.Title }}
    </a>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-1">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"
         class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-blue-700 dark:hover:text-blue-400 transition-colors{{ if eq $.RelPermalink .URL }} text-blue-700 dark:text-blue-400 bg-gray-100 dark:bg-gray-800{{ end }}"
         {{ if eq $.RelPermalink .URL }}aria-current="page"{{ end }}>
        {{ .Name }}
      </a>
      {{ end }}
      {{- partial "dark-mode-toggle.html" . }}
    </nav>

    <!-- Mobile: dark mode toggle + hamburger -->
    <div class="flex items-center gap-1 md:hidden">
      {{- partial "dark-mode-toggle.html" . }}
      <button id="menu-toggle" class="p-2 rounded-md text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="Open menu" aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Mobile drawer -->
<div id="mobile-menu" class="fixed inset-y-0 right-0 z-50 w-64 bg-white dark:bg-gray-900 shadow-xl transform translate-x-full transition-transform duration-200 ease-in-out md:hidden" aria-hidden="true">
  <div class="flex items-center justify-between p-4 border-b border-gray-100 dark:border-gray-800">
    <span class="text-sm font-semibold text-gray-900 dark:text-white">Menu</span>
    <button id="menu-close" class="p-1.5 rounded-md text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="Close menu">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  <nav class="flex flex-col gap-1 p-3">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}"
       class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-blue-700 dark:hover:text-blue-400 transition-colors{{ if eq $.RelPermalink .URL }} text-blue-700 dark:text-blue-400 bg-gray-50 dark:bg-gray-800{{ end }}"
       {{ if eq $.RelPermalink .URL }}aria-current="page"{{ end }}>
      {{ .Name }}
    </a>
    {{ end }}
  </nav>
</div>
<!-- Backdrop -->
<div id="menu-backdrop" class="fixed inset-0 z-40 bg-black/50 hidden md:hidden"></div>

<script>
(function () {
  const toggle = document.getElementById('menu-toggle');
  const close  = document.getElementById('menu-close');
  const menu   = document.getElementById('mobile-menu');
  const backdrop = document.getElementById('menu-backdrop');

  function openMenu() {
    menu.classList.remove('translate-x-full');
    menu.setAttribute('aria-hidden', 'false');
    backdrop.classList.remove('hidden');
    toggle.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }
  function closeMenu() {
    menu.classList.add('translate-x-full');
    menu.setAttribute('aria-hidden', 'true');
    backdrop.classList.add('hidden');
    toggle.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', openMenu);
  close.addEventListener('click', closeMenu);
  backdrop.addEventListener('click', closeMenu);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });
})();

// Dark mode toggle
(function () {
  document.getElementById('theme-toggle').addEventListener('click', function () {
    const html = document.documentElement;
    const isDark = html.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });
})();
</script>
