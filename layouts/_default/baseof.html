<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}" class="light">
<head>
  {{- partial "head.html" . }}
</head>
<body class="min-h-screen flex flex-col bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
  <script>
    // Apply saved or system theme before first paint to avoid flash
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

  {{- partial "header.html" . }}

  <main class="flex-1">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . }}
</body>
</html>
