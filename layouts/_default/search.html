{{ define "main" }}
<div class="container mx-auto px-4 py-10 max-w-2xl">

  <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-8">Search</h1>

  <div class="relative">
    <input type="text" id="search-input"
           placeholder="{{ .Params.placeholder | default "Search posts..." }}"
           class="w-full px-4 py-3 pl-11 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors text-sm"
           autocomplete="off">
    <svg class="absolute left-3.5 top-3.5 w-4 h-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
  </div>

  <div id="search-results" class="mt-6 space-y-3"></div>
  <p id="search-empty" class="hidden mt-6 text-gray-500 dark:text-gray-400 text-sm">No results found.</p>

</div>

<script src="/js/fuse.basic.min.js"></script>
<script>
(async function () {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const empty = document.getElementById('search-empty');

  let fuse;
  try {
    const res = await fetch('/index.json');
    const data = await res.json();
    fuse = new Fuse(data, {
      keys: ['title', 'summary', 'tags', 'categories'],
      threshold: 0.35,
      minMatchCharLength: 2,
      ignoreLocation: true,
    });
  } catch (e) {
    console.error('Search index failed to load', e);
    return;
  }

  function render(query) {
    results.innerHTML = '';
    empty.classList.add('hidden');

    if (!query || query.length < 2) return;

    const hits = fuse.search(query, { limit: 15 });

    if (hits.length === 0) {
      empty.classList.remove('hidden');
      return;
    }

    hits.forEach(function ({ item }) {
      const el = document.createElement('a');
      el.href = item.permalink;
      el.className = 'block p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-blue-300 dark:hover:border-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors';
      el.innerHTML = '<h3 class="font-semibold text-gray-900 dark:text-white text-sm">' + item.title + '</h3>' +
        (item.summary ? '<p class="mt-1 text-xs text-gray-500 dark:text-gray-400 line-clamp-2">' + item.summary + '</p>' : '');
      results.appendChild(el);
    });
  }

  input.addEventListener('input', function () { render(this.value.trim()); });

  // Support ?q= in URL
  const q = new URLSearchParams(window.location.search).get('q');
  if (q) { input.value = q; render(q); }
  input.focus();
})();
</script>
{{ end }}
