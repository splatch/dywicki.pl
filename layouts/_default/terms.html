{{ define "main" }}
<div class="container mx-auto px-4 py-10">

  <h1 class="text-3xl font-bold text-gray-900 dark:text-white capitalize mb-8">{{ .Title }}</h1>

  <div class="flex flex-col lg:flex-row gap-10">

    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap gap-3">
        {{- range .Data.Terms.ByCount }}
        <a href="{{ .Page.Permalink }}"
           class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-gray-200 dark:border-gray-700 text-sm text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-blue-900/30 hover:text-blue-700 dark:hover:text-blue-400 hover:border-blue-300 dark:hover:border-blue-700 transition-colors">
          <span class="capitalize">{{ .Page.Title }}</span>
          <span class="text-xs text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded-full">{{ .Count }}</span>
        </a>
        {{- end }}
      </div>
    </div>

    {{- partial "sidebar.html" . }}

  </div>

</div>
{{ end }}
