baseURL: https://dywicki.pl
languageCode: en-US
title: Łukasz Dywicki
taxonomies:
  tag: tag

params:
  description: Hello, I'm Łukasz; software developer by hart, open source contributor and Apache Software Foundation middleware specialist.
  comments: false
  social:
    github: splatch           # your GitHub username
    linkedin: lukasz-dywicki  # your LinkedIn handle

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: true
    style: monokai

outputs:
  home:
    - HTML
    - RSS
    - JSON
outputFormats:
  RSS:
    mediaType: application/rss+xml
    baseName: feed

menu:
  main:
    - name: Posts
      url: /posts/
      weight: 20
    - name: Tags
      url: /tag/
      weight: 30
    - name: Projects
      url: /projects/
      weight: 40
    - name: Talks
      url: /talks/
      weight: 50
    - name: About me
      url: /about-me/
      weight: 60
    - name: Search
      url: /search/
      weight: 100
